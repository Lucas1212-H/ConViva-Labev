version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      PORT: 8080
      DB_CONNECTION: mysql
      DB_PORT: 3306
      DB_DATABASE: mysql-conviva
      DB_USERNAME: laravel_user
      DB_PASSWORD: 123456
      # For external Render DB use host without protocol (no https://)
      DB_HOST: meu-projeto-mysql.onrender.com
    depends_on:
      - db
    volumes:
      - ./:/app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: faunaaqui
      MYSQL_USER: fauna
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
